<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TI Sales — Workbench (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hf-styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  * { box-sizing: border-box; }

  /* On screen: stack pages vertically with a soft bg */
  body { background: #e9e6df; padding: 24px; }
  .page {
    width: 1480px;
    height: 920px;
    background: #f5f6f8;
    margin: 0 auto 24px;
    box-shadow: 0 1px 2px rgba(14,17,22,0.06), 0 8px 32px rgba(14,17,22,0.10);
    overflow: hidden;
    position: relative;
    border-radius: 8px;
  }
  .page-label {
    position: absolute;
    top: 14px;
    left: 22px;
    z-index: 50;
    font: 500 12px/1.2 ui-sans-serif, -apple-system, system-ui, sans-serif;
    color: #6b7280;
    background: rgba(255,255,255,0.85);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #e2e4e8;
    pointer-events: none;
  }
  .page-content { width: 100%; height: 100%; }

  @page { size: 1480px 920px; margin: 0; }

  @media print {
    body { background: #fff; padding: 0; }
    .page {
      margin: 0;
      box-shadow: none;
      border-radius: 0;
      break-after: page;
      page-break-after: always;
    }
    .page:last-child { break-after: auto; page-break-after: auto; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="hf-data.jsx"></script>
<script type="text/babel" src="hf-feed.jsx"></script>
<script type="text/babel" src="hf-queue.jsx"></script>
<script type="text/babel" src="hf-drawer.jsx"></script>
<script type="text/babel" src="hf-workbench.jsx"></script>

<script type="text/babel">
function Page({ label, children }) {
  return (
    <div className="page">
      <div className="page-label">{label}</div>
      <div className="page-content">{children}</div>
    </div>
  );
}

function App() {
  return (
    <>
      <Page label="1 · Default — feed left, queue right">
        <HFWorkbench openId={null} setOpenId={() => {}} />
      </Page>
      <Page label="2 · Drawer slides over from the right · Priya (flagged variant)">
        <HFWorkbench openId={"d2"} setOpenId={() => {}} />
      </Page>
      <Page label="3 · Drawer · Acme aggregate (3 engineers)">
        <HFWorkbench openId={"d3"} setOpenId={() => {}} />
      </Page>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// Auto-print after fonts + JSX have settled
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  setTimeout(() => { window.print(); }, 800);
})();
</script>
</body>
</html>
